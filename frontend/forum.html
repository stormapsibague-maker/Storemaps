<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storemaps | Foro de la Comunidad</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f5f5f5;color:#374151;}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:white;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.logo{color:#16a34a;font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;text-decoration:none;}
.search-bar{display:flex;align-items:center;background:#f3f4f6;padding:9px 16px;border-radius:30px;gap:8px;}
.search-bar input{border:none;background:transparent;outline:none;width:240px;font-size:14px;}
.location{color:#555;font-size:14px;display:flex;align-items:center;gap:6px;}

/* NAV */
.main-menu{display:flex;gap:6px;padding:10px 20px;background:white;border-bottom:1px solid #e5e7eb;overflow-x:auto;}
.main-menu a{text-decoration:none;color:#555;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;transition:.2s;white-space:nowrap;}
.main-menu a:hover{background:#f0fdf4;color:#16a34a;}
.main-menu a.active{color:#16a34a;font-weight:700;background:#f0fdf4;}

/* CONTAINER */
.container{max-width:800px;margin:28px auto;padding:0 20px;}

/* NEW POST */
.new-post{background:white;padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:0 4px 14px rgba(0,0,0,0.07);}
.new-post h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.new-post input,.new-post textarea,.new-post select{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;outline:none;margin-bottom:12px;transition:.2s;background:#fafafa;}
.new-post input:focus,.new-post textarea:focus,.new-post select:focus{border-color:#16a34a;background:white;}
.new-post textarea{resize:vertical;min-height:100px;}
.btn-post{background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border:none;padding:12px 28px;border-radius:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;transition:.2s;}
.btn-post:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(22,163,74,0.3);}
.btn-post:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.login-notice{background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:14px;font-size:13px;color:#d97706;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.login-notice a{color:#d97706;font-weight:700;text-decoration:underline;}

/* FILTERS */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{background:white;border:2px solid #e5e7eb;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;}
.filter-btn:hover{border-color:#16a34a;color:#16a34a;}
.filter-btn.active{background:#16a34a;color:white;border-color:#16a34a;}

/* POSTS */
.forum-post{background:white;padding:24px;border-radius:16px;margin-bottom:16px;box-shadow:0 3px 10px rgba(0,0,0,0.06);transition:.2s;}
.forum-post:hover{box-shadow:0 6px 20px rgba(0,0,0,0.1);}
.post-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.post-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#dcfce7,#16a34a);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#16a34a;flex-shrink:0;}
.post-meta{flex:1;}
.post-author{font-size:14px;font-weight:700;color:#111827;}
.post-time{font-size:12px;color:#9ca3af;}
.forum-post h3{font-size:17px;font-weight:700;margin-bottom:10px;color:#111827;line-height:1.4;}
.forum-post p{color:#4b5563;font-size:14px;line-height:1.7;}
.post-price{display:inline-block;background:#dcfce7;color:#16a34a;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:700;margin:10px 0;}
.post-original-price{text-decoration:line-through;color:#9ca3af;font-size:13px;margin-left:8px;}

/* BADGES */
.cat-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-left:auto;}
.cat-general{background:#f0fdf4;color:#16a34a;}
.cat-pregunta{background:#eff6ff;color:#3b82f6;}
.cat-oferta{background:#fffbeb;color:#f59e0b;}
.cat-comida{background:#fef3c7;color:#d97706;}
.cat-tecnologia{background:#ede9fe;color:#8b5cf6;}
.cat-hogar{background:#fce7f3;color:#ec4899;}
.cat-belleza{background:#fce7f3;color:#ec4899;}
.cat-deporte{background:#fee2e2;color:#ef4444;}

/* ACTIONS */
.forum-actions{display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #f3f4f6;}
.btn-like,.btn-comment-toggle,.btn-delete-post,.btn-share{background:#f3f4f6;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:#6b7280;display:flex;align-items:center;gap:6px;transition:.2s;}
.btn-like:hover{background:#fee2e2;color:#ef4444;}
.btn-like.liked{background:#fee2e2;color:#ef4444;}
.btn-comment-toggle:hover{background:#eff6ff;color:#3b82f6;}
.btn-delete-post:hover{background:#fee2e2;color:#ef4444;}
.btn-share:hover{background:#f0fdf4;color:#16a34a;}

/* COMMENTS */
.comments-box{margin-top:16px;padding-top:16px;border-top:2px solid #f3f4f6;display:none;}
.comments-box.open{display:block;}
.comments-list{max-height:300px;overflow-y:auto;margin-bottom:12px;}
.comment-item{display:flex;gap:12px;margin-bottom:12px;padding:10px;background:#f9fafb;border-radius:12px;}
.comment-avatar{width:32px;height:32px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#16a34a;flex-shrink:0;}
.comment-body{flex:1;}
.comment-author{font-size:12px;font-weight:700;color:#374151;margin-bottom:2px;}
.comment-text{font-size:13px;color:#4b5563;line-height:1.5;}
.comment-time{font-size:11px;color:#9ca3af;margin-top:4px;}
.comment-input{display:flex;gap:10px;margin-top:12px;}
.comment-input input{flex:1;padding:10px 16px;border:2px solid #e5e7eb;border-radius:24px;font-size:13px;outline:none;}
.comment-input input:focus{border-color:#16a34a;}
.comment-input button{background:#16a34a;color:white;border:none;padding:10px 20px;border-radius:24px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;}
.comment-input button:hover{background:#15803d;}
.login-to-comment{font-size:13px;color:#9ca3af;text-align:center;padding:12px;background:#f9fafb;border-radius:12px;}
.login-to-comment a{color:#16a34a;font-weight:600;}

/* LOADING & EMPTY */
.loading,.empty{text-align:center;padding:60px 20px;color:#9ca3af;}
.loading i,.empty i{font-size:48px;margin-bottom:16px;display:block;color:#d1d5db;}
.empty h3{color:#374151;margin-bottom:8px;font-size:18px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1f2937;color:white;padding:14px 28px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;transition:.3s;opacity:0;display:flex;align-items:center;gap:10px;box-shadow:0 10px 40px rgba(0,0,0,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#ef4444;}
.toast i{font-size:18px;}

/* RESPONSIVE */
@media(max-width:768px){
  .topbar{flex-wrap:wrap;gap:8px;}
  .search-bar{width:100%;order:3;margin-top:4px;}
  .search-bar input{width:100%;}
  .main-menu{overflow-x:auto;}
  .container{margin:20px auto;}
  .new-post{padding:16px;}
  .forum-post{padding:16px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="logo"><i class="fas fa-map-marker-alt"></i><b>Storemaps</b></a>
  <div class="search-bar">
    <i class="fas fa-search" style="color:#9ca3af"></i>
    <input type="text" id="searchPosts" placeholder="Buscar en el foro..." oninput="searchPosts(this.value)">
  </div>
  <div class="location"><i class="fas fa-map-marker-alt" style="color:#16a34a"></i> <span id="locationText">Ibagué</span></div>
</header>

<!-- NAV -->
<nav class="main-menu">
  <a href="index.html"><i class="fas fa-map"></i> Mapa</a>
  <a href="discover.html"><i class="fas fa-compass"></i> Descubrir</a>
  <a href="favorites.html"><i class="fas fa-heart"></i> Favoritos</a>
  <a href="forum.html" class="active"><i class="fas fa-comments"></i> Foro</a>
  <a href="videos.html"><i class="fas fa-video"></i> Videos</a>
  <a href="profile.html" id="navProfileLink" style="margin-left:auto;"><i class="fas fa-user"></i> Iniciar sesión</a>
</nav>

<div class="container">
  <!-- NEW POST -->
  <div class="new-post">
    <h3><i class="fas fa-pen" style="color:#16a34a"></i> Crear publicación</h3>
    <div id="loginNotice" class="login-notice" style="display:none">
      <i class="fas fa-info-circle"></i>
      <span>Debes <a href="profile.html">iniciar sesión</a> para publicar en el foro.</span>
    </div>
    <input type="text" id="postTitle" placeholder="Título de tu publicación...">
    <textarea id="postBody" placeholder="Escribe tu pregunta, recomendación o oferta..."></textarea>
    <div style="display:flex;gap:12px;margin-bottom:12px;">
      <select id="postCategory" style="flex:1;margin-bottom:0;">
        <option value="general">💬 General</option>
        <option value="pregunta">❓ Pregunta</option>
        <option value="oferta">🏷️ Oferta / Promo</option>
        <option value="comida">🍔 Comida</option>
        <option value="tecnologia">💻 Tecnología</option>
        <option value="hogar">🏠 Hogar</option>
        <option value="belleza">💄 Belleza</option>
        <option value="deporte">🏋️ Deporte</option>
      </select>
      <input type="number" id="postPrice" placeholder="Precio (opcional)" style="flex:1;margin-bottom:0;">
    </div>
    <button class="btn-post" onclick="addPost()" id="btnPost">
      <i class="fas fa-paper-plane"></i> Publicar
    </button>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(this, 'all')">📋 Todas</button>
    <button class="filter-btn" onclick="setFilter(this, 'pregunta')">❓ Preguntas</button>
    <button class="filter-btn" onclick="setFilter(this, 'oferta')">🏷️ Ofertas</button>
    <button class="filter-btn" onclick="setFilter(this, 'general')">💬 General</button>
  </div>

  <!-- POSTS -->
  <div id="forumPosts">
    <div class="loading">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Cargando publicaciones...</p>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastMsg">Operación exitosa</span>
</div>

<script>
// ==========================================
// CONFIGURACIÓN
// ==========================================
const API_URL = 'https://storemaps-api.onrender.com/api';
const FAVORITES_KEY = 'storemaps_favorites';

// ==========================================
// ESTADO
// ==========================================
let allPosts = [];
let currentFilter = 'all';
let user = null;

// ==========================================
// INICIALIZACIÓN
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  user = getUser();
  checkAuth();
  loadPosts();
});

// ==========================================
// AUTENTICACIÓN
// ==========================================
function getUser() {
  try {
    return JSON.parse(localStorage.getItem('sm_user'));
  } catch(e) {
    return null;
  }
}

function getToken() {
  return localStorage.getItem('sm_token');
}

function isLoggedIn() {
  return !!getToken();
}

function checkAuth() {
  if (!isLoggedIn()) {
    document.getElementById('loginNotice').style.display = 'flex';
    document.getElementById('btnPost').disabled = true;
    document.getElementById('btnPost').style.opacity = '0.5';
  }
}

// ==========================================
// CARGAR POSTS
// ==========================================
async function loadPosts() {
  try {
    const response = await fetch(`${API_URL}/forum/posts`);
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const posts = await response.json();
    allPosts = posts;
    renderPosts(posts);
    
  } catch (error) {
    console.error('Error cargando posts:', error);
    document.getElementById('forumPosts').innerHTML = `
      <div class="empty">
        <i class="fas fa-exclamation-circle"></i>
        <h3>Error al cargar el foro</h3>
        <p>${error.message}</p>
        <button onclick="loadPosts()" style="margin-top:16px;padding:10px 20px;background:#16a34a;color:white;border:none;border-radius:8px;cursor:pointer;">
          <i class="fas fa-redo"></i> Reintentar
        </button>
      </div>
    `;
  }
}

// ==========================================
// RENDERIZAR POSTS
// ==========================================
function renderPosts(posts) {
  const container = document.getElementById('forumPosts');
  
  // Filtrar si es necesario
  let filtered = posts;
  if (currentFilter !== 'all') {
    filtered = posts.filter(p => p.category === currentFilter || p.type === currentFilter);
  }
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <i class="fas fa-comments"></i>
        <h3>No hay publicaciones</h3>
        <p>Sé el primero en compartir algo con la comunidad</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = filtered.map(post => createPostHTML(post)).join('');
}

function createPostHTML(post) {
  const author = post.authorId?.displayName || post.authorId?.companyName || 'Usuario';
  const av = author.charAt(0).toUpperCase();
  const time = timeAgo(post.createdAt);
  const category = post.category || 'general';
  const myId = user?.id || user?._id;
  const authorId = post.authorId?._id || post.authorId;
  const canDelete = myId && (myId.toString() === authorId?.toString() || user?.type === 'superadmin');
  const isLiked = post.likes?.some(id => id.toString() === myId?.toString());
  const likeCount = post.likes?.length || 0;
  const commentCount = post.comments?.length || 0;
  
  // Badge de categoría
  const catLabels = {
    general: '💬 General',
    pregunta: '❓ Pregunta',
    oferta: '🏷️ Oferta',
    comida: '🍔 Comida',
    tecnologia: '💻 Tecnología',
    hogar: '🏠 Hogar',
    belleza: '💄 Belleza',
    deporte: '🏋️ Deporte'
  };
  
  // Precio si es oferta
  let priceHTML = '';
  if (post.price && post.price > 0) {
    const original = post.originalPrice ? `<span class="post-original-price">$${Number(post.originalPrice).toLocaleString('es-CO')}</span>` : '';
    priceHTML = `<div class="post-price">$${Number(post.price).toLocaleString('es-CO')} ${original}</div>`;
  }
  
  return `
    <div class="forum-post" id="post-${post._id}">
      <div class="post-header">
        <div class="post-avatar">${av}</div>
        <div class="post-meta">
          <div class="post-author">${author}</div>
          <div class="post-time"><i class="far fa-clock"></i> ${time}</div>
        </div>
        <span class="cat-badge cat-${category}">${catLabels[category] || '💬 General'}</span>
      </div>
      <h3>${post.title}</h3>
      <p>${post.content}</p>
      ${priceHTML}
      <div class="forum-actions">
        <button class="btn-like ${isLiked ? 'liked' : ''}" id="like-${post._id}" onclick="likePost('${post._id}')">
          <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i> <span id="lc-${post._id}">${likeCount}</span>
        </button>
        <button class="btn-comment-toggle" onclick="toggleComments('${post._id}')">
          <i class="fas fa-comment"></i> <span id="cc-${post._id}">${commentCount}</span> comentarios
        </button>
        <button class="btn-share" onclick="sharePost('${post._id}')">
          <i class="fas fa-share"></i> Compartir
        </button>
        ${canDelete ? `<button class="btn-delete-post" onclick="deletePost('${post._id}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
      <div class="comments-box" id="comments-${post._id}">
        <div class="comments-list" id="clist-${post._id}">
          ${(post.comments || []).map(c => createCommentHTML(c)).join('')}
        </div>
        ${isLoggedIn() ? `
        <div class="comment-input">
          <input type="text" id="ci-${post._id}" placeholder="Escribe un comentario..." onkeydown="if(event.key==='Enter')sendComment('${post._id}')">
          <button onclick="sendComment('${post._id}')"><i class="fas fa-paper-plane"></i></button>
        </div>
        ` : `
        <div class="login-to-comment">
          <a href="profile.html">Inicia sesión</a> para dejar un comentario
        </div>
        `}
      </div>
    </div>
  `;
}

function createCommentHTML(comment) {
  const author = comment.userId?.displayName || 'Usuario';
  const av = author.charAt(0).toUpperCase();
  const time = timeAgo(comment.createdAt);
  
  return `
    <div class="comment-item">
      <div class="comment-avatar">${av}</div>
      <div class="comment-body">
        <div class="comment-author">${author}</div>
        <div class="comment-text">${comment.text}</div>
        <div class="comment-time">${time}</div>
      </div>
    </div>
  `;
}

// ==========================================
// ACCIONES
// ==========================================
async function addPost() {
  if (!isLoggedIn()) {
    showToast('Debes iniciar sesión para publicar', 'error');
    return;
  }
  
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postBody').value.trim();
  const category = document.getElementById('postCategory').value;
  const price = document.getElementById('postPrice').value;
  
  if (!title || !content) {
    showToast('Completa el título y el contenido', 'error');
    return;
  }
  
  const btn = document.getElementById('btnPost');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publicando...';
  
  try {
    const postData = {
      type: category === 'oferta' ? 'offer' : category === 'pregunta' ? 'question' : 'general',
      title,
      content,
      category,
      price: price ? Number(price) : undefined
    };
    
    const response = await fetch(`${API_URL}/forum/posts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      },
      body: JSON.stringify(postData)
    });
    
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.message || 'Error al publicar');
    }
    
    // Limpiar formulario
    document.getElementById('postTitle').value = '';
    document.getElementById('postBody').value = '';
    document.getElementById('postPrice').value = '';
    
    showToast('¡Publicación creada exitosamente!', 'success');
    loadPosts(); // Recargar
    
  } catch (error) {
    showToast(error.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publicar';
  }
}

async function likePost(id) {
  if (!isLoggedIn()) {
    showToast('Debes iniciar sesión para dar like', 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/forum/posts/${id}/like`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${getToken()}`
      }
    });
    
    if (!response.ok) throw new Error('Error');
    
    const data = await response.json();
    
    // Actualizar UI
    const btn = document.getElementById(`like-${id}`);
    const count = document.getElementById(`lc-${id}`);
    
    count.textContent = data.likes;
    btn.classList.toggle('liked');
    
    const icon = btn.querySelector('i');
    icon.className = btn.classList.contains('liked') ? 'fas fa-heart' : 'far fa-heart';
    
  } catch (error) {
    showToast('Error al dar like', 'error');
  }
}

function toggleComments(id) {
  const box = document.getElementById(`comments-${id}`);
  box.classList.toggle('open');
}

async function sendComment(postId) {
  const input = document.getElementById(`ci-${postId}`);
  const text = input.value.trim();
  
  if (!text) return;
  
  try {
    const response = await fetch(`${API_URL}/forum/posts/${postId}/comment`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      },
      body: JSON.stringify({ text })
    });
    
    if (!response.ok) throw new Error('Error');
    
    const comments = await response.json();
    
    // Construir el comentario con datos del usuario actual para mostrar nombre correcto
    const lastComment = comments[comments.length - 1];
    const displayComment = {
      ...lastComment,
      userId: {
        _id: user?.id || user?._id,
        displayName: user?.displayName || user?.companyName || user?.name,
        photoURL: user?.photoURL
      }
    };

    // Actualizar lista
    const list = document.getElementById(`clist-${postId}`);
    list.insertAdjacentHTML('beforeend', createCommentHTML(displayComment));
    
    // Actualizar contador
    const count = document.getElementById(`cc-${postId}`);
    count.textContent = comments.length;
    
    // Limpiar input
    input.value = '';
    
    showToast('Comentario enviado', 'success');
    
  } catch (error) {
    showToast('Error al comentar', 'error');
  }
}

async function deletePost(id) {
  if (!confirm('¿Estás seguro de eliminar esta publicación?')) return;
  
  try {
    const response = await fetch(`${API_URL}/forum/posts/${id}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${getToken()}`
      }
    });
    
    if (!response.ok) throw new Error('Error');
    
    // Animar salida
    const post = document.getElementById(`post-${id}`);
    post.style.transform = 'translateX(-100%)';
    post.style.opacity = '0';
    
    setTimeout(() => {
      post.remove();
      if (document.querySelectorAll('.forum-post').length === 0) {
        loadPosts();
      }
    }, 300);
    
    showToast('Publicación eliminada', 'success');
    
  } catch (error) {
    showToast('Error al eliminar', 'error');
  }
}

function sharePost(id) {
  const url = `${window.location.origin}/forum.html?post=${id}`;
  if (navigator.share) {
    navigator.share({
      title: 'Storemaps - Foro',
      text: 'Mira esta publicación en Storemaps',
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    showToast('Link copiado al portapapeles', 'success');
  }
}

// ==========================================
// FILTROS Y BÚSQUEDA
// ==========================================
function setFilter(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderPosts(allPosts);
}

function searchPosts(query) {
  if (!query.trim()) {
    renderPosts(allPosts);
    return;
  }
  
  const q = query.toLowerCase();
  const filtered = allPosts.filter(p => {
    const title = (p.title || '').toLowerCase();
    const content = (p.content || '').toLowerCase();
    const author = (p.authorId?.displayName || '').toLowerCase();
    return title.includes(q) || content.includes(q) || author.includes(q);
  });
  
  renderPosts(filtered);
}

// ==========================================
// UTILIDADES
// ==========================================
function timeAgo(date) {
  const seconds = Math.floor((Date.now() - new Date(date)) / 1000);
  
  if (seconds < 60) return 'hace un momento';
  if (seconds < 3600) return `hace ${Math.floor(seconds / 60)} min`;
  if (seconds < 86400) return `hace ${Math.floor(seconds / 3600)}h`;
  if (seconds < 604800) return `hace ${Math.floor(seconds / 86400)} días`;
  return new Date(date).toLocaleDateString('es-CO');
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  const msg = document.getElementById('toastMsg');
  const icon = toast.querySelector('i');
  
  msg.textContent = message;
  toast.className = `toast ${type}`;
  
  if (type === 'success') icon.className = 'fas fa-check-circle';
  else if (type === 'error') icon.className = 'fas fa-exclamation-circle';
  
  toast.classList.add('show');
  
  setTimeout(() => toast.classList.remove('show'), 3000);
}

<script>
// Actualizar nav: Perfil → Iniciar sesión si no hay sesión
(function() {
  function updateNav() {
    const token = localStorage.getItem('sm_token');
    const user = (() => { try { return JSON.parse(localStorage.getItem('sm_user')); } catch(e) { return null; } })();
    const link = document.getElementById('navProfileLink');
    if (!link) return;
    if (token && user) {
      const name = user.displayName || user.companyName || 'Perfil';
      const initial = name.charAt(0).toUpperCase();
      link.innerHTML = '<span style="background:#16a34a;color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">' + initial + '</span> ' + name;
      link.style.color = '#16a34a';
      link.style.fontWeight = '700';
    } else {
      link.innerHTML = '<i class="fas fa-user"></i> Iniciar sesión';
      link.style.color = '';
      link.style.fontWeight = '';
    }
  }
  document.addEventListener('DOMContentLoaded', updateNav);
  window.addEventListener('storage', updateNav);
})();
</script>
